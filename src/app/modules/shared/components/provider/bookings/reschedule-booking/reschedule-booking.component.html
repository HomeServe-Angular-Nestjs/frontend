<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div
        class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-300">
        <!-- Header -->
        <div class="px-6 py-4 bg-gradient-to-r from-green-600 to-emerald-600 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-calendar-alt text-white"></i>
                </div>
                <div>
                    <h2 class="text-lg font-bold text-white">Reschedule Booking</h2>
                    <p class="text-xs text-green-100 italic">Select a new date and time slot</p>
                </div>
            </div>
            <button (click)="onClose()" class="text-white/80 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 space-y-6">
            <!-- Current Schedule Info -->
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 flex items-start gap-3">
                <i class="fas fa-info-circle text-blue-500 mt-1"></i>
                <div class="text-sm">
                    <p class="font-semibold text-blue-800">Today</p>
                    <p class="text-blue-600">{{ today | date:'medium' }}</p>
                </div>
            </div>

            <!-- Date Selection -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Select Date</label>
                <div class="relative">
                    <input type="date" [(ngModel)]="selectedDate" (change)="getAvailableSlots()" [min]="today"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-all outline-none">
                </div>
            </div>

            <!-- Slots Selection -->
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-bold text-gray-700">Available Slots</label>
                    <span *ngIf="loadingSlots()" class="text-xs text-green-600 font-medium">
                        <i class="fas fa-spinner fa-spin mr-1"></i> Loading...
                    </span>
                </div>

                <div *ngIf="!loadingSlots() && availableSlots.length > 0"
                    class="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto pr-1 scrollbar-thin scrollbar-thumb-gray-200">
                    <button *ngFor="let slot of availableSlots" (click)="selectSlot(slot)"
                        [disabled]="!slot.isAvailable" [ngClass]="{
                            'bg-green-600 text-white border-green-700 shadow-md': selectedSlot === slot,
                            'bg-white text-gray-700 border-gray-200 hover:border-green-300 hover:bg-green-50': slot.isAvailable && selectedSlot !== slot,
                            'bg-gray-100 text-gray-400 border-gray-100 cursor-not-allowed': !slot.isAvailable
                        }" class="px-3 py-2 text-xs font-semibold rounded-lg border transition-all duration-200">
                        {{ slot.from | meridiem }} - {{ slot.to | meridiem }}
                    </button>
                </div>

                <div *ngIf="!loadingSlots() && availableSlots.length === 0 && selectedDate"
                    class="py-10 text-center bg-gray-50 rounded-xl border border-dashed border-gray-300">
                    <i class="fas fa-calendar-times text-gray-300 text-3xl mb-2"></i>
                    <p class="text-sm text-gray-500 font-medium">No slots available for this date</p>
                </div>

                <div *ngIf="!selectedDate"
                    class="py-10 text-center bg-gray-50 rounded-xl border border-dashed border-gray-300">
                    <i class="fas fa-calendar-day text-gray-300 text-3xl mb-2"></i>
                    <p class="text-sm text-gray-500 font-medium">Please select a date first</p>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end gap-3">
            <button (click)="onClose()"
                class="px-6 py-2 text-sm font-bold text-gray-600 hover:text-gray-800 transition">
                Cancel
            </button>
            <button (click)="onConfirm()" [disabled]="!selectedSlot"
                [ngClass]="{'opacity-50 cursor-not-allowed': !selectedSlot}"
                class="px-8 py-2.5 bg-green-600 text-white text-sm font-bold rounded-xl hover:bg-green-700 shadow-lg shadow-green-200 transition-all transform active:scale-95">
                Confirm Reschedule
            </button>
        </div>
    </div>
</div>
