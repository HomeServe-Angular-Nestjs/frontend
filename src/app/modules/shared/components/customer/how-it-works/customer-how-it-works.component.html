<section id="how-it-works" class="bg-white py-20 sm:py-24 lg:py-28 border-b border-slate-100">
  <div class="max-w-7xl mx-auto px-6 sm:px-8">
    <div class="max-w-3xl mx-auto text-center">
      <h2
        class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-slate-900 tracking-tight leading-tight text-wrap-balance">
        How HomeServe Works for You
      </h2>
      <p class="mt-4 text-base md:text-lg text-slate-600 leading-relaxed">
        From search to service day, HomeServe keeps every booking clear, secure, and easy to manage.
      </p>
    </div>

    <div class="mt-14 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-5 lg:gap-6">
      <article *ngFor="let step of steps"
        class="group h-full rounded-lg border border-slate-200 bg-white p-6 shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-all duration-300 hover:-translate-y-1 hover:border-blue-200 hover:shadow-lg">
        <div
          class="w-12 h-12 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-lg transition-colors duration-300 group-hover:bg-blue-600 group-hover:text-white">
          <i [class]="'fas ' + step.icon" aria-hidden="true"></i>
        </div>

        <h3 class="mt-6 text-lg font-bold text-slate-900 tracking-tight">
          {{ step.title }}
        </h3>
        <p class="mt-3 text-sm leading-relaxed text-slate-600">
          {{ step.description }}
        </p>
      </article>
    </div>
  </div>
</section>
