<div class="mb-10">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
        <div>
            <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-[0.2em] mb-1">Analytics</p>
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Booking Summary Overview</h2>
        </div>
        <div class="px-4 py-2 bg-indigo-50 rounded-xl border border-indigo-100/50">
            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">Total Volume</p>
            <p class="text-xs font-semibold text-indigo-700">All time data tracking</p>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-5">
        <app-admin-overview-card *ngFor="let stat of stats" [icon]="stat.icon" [iconBg]="stat.iconBg"
            [title]="stat.title" [value]="stat.value" [subtext]="stat.subtext">
        </app-admin-overview-card>
    </div>
</div>

<div class="space-y-6">
    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-8 py-6 border-b border-slate-50 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
            <div>
                <h3 class="text-lg font-black text-slate-900 tracking-tight">Booking History Trail</h3>
                <p class="text-xs text-slate-500 font-medium mt-1">Full audit log of service appointments and status
                    changes</p>
            </div>

            <div class="flex items-center gap-3">
                <app-admin-booking-filters (filterEvent)="applyFilters($event)"></app-admin-booking-filters>
            </div>
        </div>

        <div class="px-8 py-4 bg-slate-50/50 border-b border-slate-50 flex items-center justify-between">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                Displaying most recent activity first
            </p>
            <!-- Optional: Export Button -->
        </div>

        <!-- Bookings Table Area -->
        <div class="relative min-h-[400px]">
            <ng-container *ngIf="bookings$ | async as bookings; else loading">
                <app-admin-booking-table [bookings]="bookings"></app-admin-booking-table>

                <!-- Pagination Footer -->
                <div *ngIf="pagination?.page" class="px-8 py-6 border-t border-slate-50 bg-white">
                    <app-admin-pagination [pagination]="pagination"
                        (pageChange)="changePage($event)"></app-admin-pagination>
                </div>
            </ng-container>
        </div>
    </div>
</div>

<ng-template #loading>
    <div class="flex flex-col items-center justify-center p-20">
        <app-loading-circle-animation></app-loading-circle-animation>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4 animate-pulse">Syncing data...</p>
    </div>
</ng-template>
